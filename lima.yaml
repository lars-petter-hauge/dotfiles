# VM base image — Ubuntu 24.04 cloud images for both ARM and x86
images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"

# Share host ~/GitProjects into the VM at the user's home directory.
# Writable so code edits in the VM reflect on the host and vice versa.
mounts:
  - location: "~/GitProjects"
    mountPoint: "/home/lima.guest/GitProjects"
    writable: true

# Disable Lima's built-in containerd — we use rootless Docker instead.
containerd:
  system: false
  user: false

provision:
  # System provisioning (runs as root).
  # Installs base packages and configures AppArmor for rootless Docker.
  - mode: system
    script: |
      #!/bin/bash
      set -e
      export DEBIAN_FRONTEND=noninteractive
      apt-get update && apt-get install -y \
        git curl wget sudo locales build-essential \
        openssh-client ca-certificates uidmap dbus-user-session fuse-overlayfs
      locale-gen en_US.UTF-8
      modprobe ip_tables || true
      sysctl -w net.ipv4.ip_forward=1
      systemctl disable --now docker.service docker.socket 2>/dev/null || true
      # Ubuntu 24.04 restricts unprivileged user namespaces via AppArmor.
      # Rootless Docker needs them, so we allow rootlesskit specifically.
      cat <<'EOT' > /etc/apparmor.d/home.lima.guest.bin.rootlesskit
      abi <abi/4.0>,
      include <tunables/global>

      /home/lima.guest/bin/rootlesskit flags=(unconfined) {
        userns,
        include if exists <local/home.lima.guest.bin.rootlesskit>
      }
      EOT
      systemctl restart apparmor.service

  # User provisioning (runs as the lima user).
  # Installs rootless Docker, Homebrew, dev tools, and dotfiles.
  - mode: user
    script: |
      #!/bin/bash
      set -e
      # Rootless Docker — runs daemon as user, no sudo needed for docker commands.
      curl -fsSL https://get.docker.com/rootless | sh
      mkdir -p ~/.docker/cli-plugins
      curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m) -o ~/.docker/cli-plugins/docker-compose
      chmod +x ~/.docker/cli-plugins/docker-compose
      systemctl --user enable docker
      # Homebrew + dev tools from Brewfile (shared with macOS host).
      NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
      DOTFILES="$HOME/GitProjects/dotfiles"
      brew bundle install --file="$DOTFILES/Brewfile"
      cd "$DOTFILES" && ./install.sh
      sudo chsh -s /home/linuxbrew/.linuxbrew/bin/zsh "$(whoami)"

# Resolve host.lima.internal to the macOS host (for accessing host services).
hostResolver:
  enabled: true

# Forward SSH agent so git/gh commands in the VM use host SSH keys.
ssh:
  forwardAgent: true
